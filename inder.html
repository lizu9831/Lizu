<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIZU.EXE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:black;
overflow:hidden;
height:100vh;
color:white;
}

/* SCREENS */

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* ENTER BUTTON */

#enterBtn{
padding:15px 45px;
font-size:18px;
letter-spacing:4px;
background:transparent;
color:white;
border:1px solid white;
cursor:pointer;
transition:.3s;
}

#enterBtn:hover{
transform:scale(1.05);
}

.hidden{
display:none;
}

/* TERMINAL */

#terminal{
font-family:monospace;
font-size:20px;
line-height:2;
text-align:left;
width:80%;
max-width:700px;
}

/* FINAL SCREEN */

#final{
background:black;
overflow:hidden;
}

/* STARS */

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:80px 80px;
opacity:.25;
animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{
from{opacity:.15;}
to{opacity:.35;}
}

/* RAIN */

.rain{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.drop{
position:absolute;
bottom:100%;
width:1px;
height:80px;
background:rgba(255,255,255,.25);
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(120vh);
}
}

/* QUOTE */

.quote{
position:relative;
z-index:10;
font-size:clamp(30px,5vw,70px);
font-weight:300;
letter-spacing:3px;
text-align:center;
text-shadow:
0 0 10px rgba(255,255,255,.3);
opacity:0;
transition:2s;
}

.show{
opacity:1;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="wishes.mp3" type="audio/mpeg">
</audio>

<!-- ENTER -->

<div id="enterScreen" class="screen">

<button id="enterBtn">
ENTER
</button>

</div>

<!-- TERMINAL -->

<div id="terminalScreen" class="screen hidden">

<div id="terminal"></div>

</div>

<!-- FINAL -->

<div id="final" class="screen hidden">

<div class="stars"></div>

<div class="rain" id="rain"></div>

<div class="quote" id="quote">

some wishes<br>
stay untold.

</div>

</div>

<script>

const button =
document.getElementById("enterBtn");

button.addEventListener("click", start);

const lines = [
"INITIALIZING...",
"ACCESSING USER: LIZU",
"LOADING SOUNDTRACK...",
"PLAYBACK READY"
];

function start(){

document.getElementById("enterScreen")
.classList.add("hidden");

document.getElementById("terminalScreen")
.classList.remove("hidden");

document.getElementById("music")
.play();

typeLines();

}

let lineIndex = 0;
let charIndex = 0;

function typeLines(){

const terminal =
document.getElementById("terminal");

if(lineIndex >= lines.length){

setTimeout(showFinal,1000);

return;

}

if(charIndex < lines[lineIndex].length){

terminal.innerHTML +=
lines[lineIndex][charIndex];

charIndex++;

setTimeout(typeLines,60);

}else{

terminal.innerHTML += "<br>";

lineIndex++;
charIndex = 0;

setTimeout(typeLines,500);

}

}

function showFinal(){

document.getElementById("terminalScreen")
.classList.add("hidden");

document.getElementById("final")
.classList.remove("hidden");

createRain();

setTimeout(()=>{

document.getElementById("quote")
.classList.add("show");

},300);

}

function createRain(){

const rain =
document.getElementById("rain");

for(let i=0;i<180;i++){

const drop =
document.createElement("div");

drop.classList.add("drop");

drop.style.left =
Math.random()*100 + "%";

drop.style.animationDuration =
(.5 + Math.random()*.8) + "s";

drop.style.animationDelay =
Math.random()*2 + "s";

rain.appendChild(drop);

}

}

</script>

</body>
</html>
